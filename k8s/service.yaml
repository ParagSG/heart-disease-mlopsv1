apiVersion: v1
kind: Service
metadata:
  name: heart-disease-api-svc
  labels:
    app: heart-disease-api
spec:
  type: LoadBalancer       # Exposes public IP via Azure Load Balancer on AKS
  selector:
    app: heart-disease-api
  ports:
    - protocol: TCP
      port:       80
      targetPort: 8000
